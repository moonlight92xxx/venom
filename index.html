    <div class="data-tag tag-1">VENOM_LV.7.777</div>

      <span class="wl-line1">The world of</span>
      <span class="wl-line2 glitch" data-text="VENOM">VENOM</span>

      <span class="btn-bg"></span>
      <span class="btn-text">CLICK TO ENTER</span>
      <span class="btn-pulse"></span>
    </button>
    <div class="enter-hint">bond with the venom</div>
  </div>

  <!-- ===================== PHASE 4: PORTAL WARP TRANSITION (10/10) ===================== -->
  <div id="phase-boom" class="phase hidden">
    <canvas id="boom-canvas"></canvas>
    <div id="boom-counter" class="boom-counter">+0</div>
    <div class="boom-text">VENOM BONDED</div>
  </div>

  <!-- audio: silent radio that primes the audio context -->

<!-- ============================================================
     VENOM SECURITY LAYER — Anti-copy, anti-save, anti-devtools
     ============================================================ -->
<script>
(function() {
  'use strict';

  // 1. Disable right-click context menu
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  });

  // 2. Disable text selection (except in inputs)
  document.addEventListener('selectstart', function(e) {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      return false;
    }
  });

  // 3. Disable copy/cut/paste (except in inputs)
  document.addEventListener('copy', function(e) {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      return false;
    }
  });
  document.addEventListener('cut', function(e) {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      return false;
    }
  });

  // 4. Disable drag and drop (prevents dragging images to save)
  document.addEventListener('dragstart', function(e) {
    e.preventDefault();
    return false;
  });

  // 5. Disable image saving via long-press (mobile)
  document.addEventListener('touchstart', function(e) {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
    }
  }, { passive: false });

  // 6. Detect DevTools (basic detection — slows them down)
  let devtoolsOpen = false;
  const threshold = 200; // pixels
  
  setInterval(function() {
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) {
      if (!devtoolsOpen) {
        devtoolsOpen = true;
        // Optional: redirect or show warning
        document.body.style.opacity = '0.3';
        setTimeout(function() { document.body.style.opacity = ''; }, 2000);
      }
    } else {
      if (devtoolsOpen) {
        devtoolsOpen = false;
        document.body.style.opacity = '';
      }
    }
  }, 1000);

  // 7. Disable keyboard shortcuts (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S)
  document.addEventListener('keydown', function(e) {
    // F12
    if (e.keyCode === 123) {
      e.preventDefault();
      return false;
    }
    // Ctrl+Shift+I (DevTools)
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
      e.preventDefault();
      return false;
    }
    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
      e.preventDefault();
      return false;
    }
    // Ctrl+Shift+C (Element Inspector)
    if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
      e.preventDefault();
      return false;
    }
    // Ctrl+U (View Source)
    if (e.ctrlKey && e.keyCode === 85) {
      e.preventDefault();
      return false;
    }
    // Ctrl+S (Save Page)
    if (e.ctrlKey && e.keyCode === 83) {
      e.preventDefault();
      return false;
    }
    // Ctrl+A (Select All) — only block if not in input
    if (e.ctrlKey && e.keyCode === 65) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
        return false;
      }
    }
  });

  // 8. Clear console periodically (makes inspection harder)
  setInterval(function() {
    try {
      console.clear();
    } catch(e) {}
  }, 5000);

  // 9. Disable view-source navigation
  window.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.keyCode === 85) { // Ctrl+U
      e.preventDefault();
      window.location.href = 'about:blank';
      return false;
    }
  });

  console.log('%c╔══════════════════════════════════════════════════════════╗', 'color: #00ff66; font-size: 12px;');
    console.log('%c║  © 2026 VELXT STUDIOS & AZUR. ALL RIGHTS RESERVED.     ║', 'color: #00ff66; font-size: 12px;');
    console.log('%c║  Unauthorized copying, modification, or distribution     ║', 'color: #00ff66; font-size: 12px;');
    console.log('%c║  of this software is strictly prohibited.               ║', 'color: #00ff66; font-size: 12px;');
    console.log('%c║  LICENSED TO: VELXT STUDIOS & AZUR                      ║', 'color: #00ff66; font-size: 12px;');
    console.log('%c╚══════════════════════════════════════════════════════════╝', 'color: #00ff66; font-size: 12px;');
  console.log('%cViolators will be prosecuted to the full extent of the law.', 'color: #ff2244; font-size: 14px;');
})();
</script>
